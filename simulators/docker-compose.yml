services:
  device_agent:
    image: spaneng/doover_device_agent:apps
    ports:
      - 50051:50051

  modbus_iface:
    image: spaneng/doover_modbus_iface
    network_mode: host

  vega_sim:
    build: ./vega_sim
    network_mode: host

  application:
    build: ../
    network_mode: host
    restart: unless-stopped
    depends_on:
      - device_agent
      - modbus_iface
      - vega_sim
    environment:
      - APP_KEY=test_app_key
      - CONFIG_FP=/app/simulators/app_config.json
      - DDA_URI=127.0.0.1:50051
